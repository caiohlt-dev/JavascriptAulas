<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 03 - Situação do aluno</title>
</head>
<body>
    <script>
        let nota = parseFloat(prompt("Digite sua nota:"));

        if(nota >= 7){
            alert("Aprovado!");
        }else if (nota >= 5){
            alert("Recuperação!");
        }else {
            alert("Reprovado! :( ");
        }

    </script>
</body>
</html>
