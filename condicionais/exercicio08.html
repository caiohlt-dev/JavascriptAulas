<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let peso = parseFloat(prompt("Digite seu peso"))
        let altura = parseFloat(prompt("Digite sua altura"))
        let divisor = altura * altura
        let imc = peso / divisor

        if(imc <= 18.5) {
            alert("Você está abaixo do peso ideal")
        }
        else if(imc < 25) {
            alert("Você está no peso normal")
        }
        else if(imc < 30) {
            alert("Você está acima do peso ideal")
        }
        else if(imc < 35) {
            alert("Você está com obesidade grau I")
        }
        else if(imc > 35) {
            alert("Você está com obesidade grau II ou superior")
        }
        
    </script>
</body>
</html>
