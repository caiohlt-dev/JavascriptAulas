<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let idade = parseFloat(prompt("Digite sua idade"));
        
        if(idade < 5) {
            alert("Você não pode participar")
        } else if(idade <= 7) {
            alert("Categoria Infantil A")
        } else if(idade <= 10) {
            alert("Categoria Infantil B")
        } else if(idade <= 13) {
            alert("Categoria Juvenil A")
        } else if(idade <= 17) {
            alert("Categoria Juvenil B")
        } else if(idade <= 100) {
            alert("Categoria Adulta")
        } else if(idade > 100) {
            alert("Você está vivo?")
        }
    </script>
</body>
</html>
