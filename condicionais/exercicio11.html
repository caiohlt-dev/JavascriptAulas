<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let idade = parseFloat(prompt("Digite a sua idade"));
        
        if(idade < 12) {
            alert("Você pode assistir conteúdos infantis")
        }
        else if(idade < 18) {
            alert("Você pode assistir conteúdos para adolescentes")
        }
        else if(idade >= 18) {
            alert("Você pode assistir qualquer tipo de conteúdo")
        }
    </script>
</body>
</html>
