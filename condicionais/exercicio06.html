<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let idade = parseFloat(prompt("Digite a sua idade"))
        
        if(idade < 16) {
            alert("Você não pode votar")
        }
        else if(idade < 18) {
            alert("Seu voto é facultativo")
        }
        else if(idade < 71) {
            alert("Seu voto é obrigatório")
        }
        else {
            alert("Seu voto é facultativo")
        }
    </script>
</body>
</html>
